# mdcast BrandSpec (issue #68) — palette/fonts mapped from this site's own
# `:root` custom properties in `design/assets/css/style.css`. Keep the two in
# sync: change a color there and mirror it here.
#
# Loaded by `src/export/render.rs` via `DesignStore::load("mdcast/brand.toml")`
# — the same override-then-baked resolution public pages use, so a
# `DESIGN_DIR` deployment can ship its own brand config without a rebuild.
name = "Site"

[palette]
background = "#f5f5f5"  # --bg
text       = "#222222"  # --text
heading    = "#111111"  # --black (h1/h2/h3, and `a` at rest)
muted      = "#888888"  # --muted
accent     = "#2563eb"  # --accent (`a:hover`, buttons)
link       = "#2563eb"  # reveal.js has no hover state on a projected slide,
                        # so links use --accent rather than the site's
                        # barely-distinguishable at-rest black
border     = "#dddddd"  # --border

[fonts]
# typst (PDF) ships no bundled proportional sans face — typst-kit's embedded
# fonts are New Computer Modern, Libertinus Serif, and DejaVu Sans Mono only
# — so `sans` keeps the pre-existing default rather than naming a face typst
# can't actually render. Shipping the site's real font as a `ResolvedDoc.fonts`
# asset is a follow-up, not this change.
sans = "New Computer Modern"
mono = "DejaVu Sans Mono"

# reveal.js renders in a real browser, so it gets the site's actual stack.
body    = "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif"
heading = "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif"
code    = "DejaVu Sans Mono, ui-monospace, SFMono-Regular, monospace"
