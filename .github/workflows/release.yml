name: Release

# Runs on version-tag pushes — CalVer date tags (e.g. v2026.07.22): measure
# coverage, and only if both suites pass, build and push the Docker image
# tagged from the version.
on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  coverage-backend:
    name: Backend coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # --lib only: no bins, so no client/dist / rust-embed needed here.
      - name: Coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --lib --no-report
          cargo llvm-cov report --lcov --output-path coverage/backend.lcov
          {
            echo '### Backend coverage'
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage/backend.lcov

  coverage-frontend:
    name: Frontend coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: client/.nvmrc
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Coverage
        working-directory: client
        run: |
          set -o pipefail
          npm ci
          npx vitest run --coverage 2>&1 | tee coverage.txt
          {
            echo '### Frontend coverage'
            echo '```'
            tail -n 15 coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: client/coverage/lcov.info

  docker:
    name: Build + push image
    runs-on: ubuntu-latest
    needs: [coverage-backend, coverage-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # CalVer tags (v2026.07.22) are not semver (leading zeros), so
          # extract the image tags by regex: full date + year.month + latest.
          tags: |
            type=match,pattern=v(.+),group=1
            type=match,pattern=v(\d+\.\d+),group=1
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
