name: Backend

on:
  pull_request:
    branches: [master]
    paths:
      - src/**
      - tests/**
      - Cargo.toml
      - Cargo.lock
      - Makefile
      - .github/workflows/backend.yml

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Lint + tests
    runs-on: ubuntu-latest

    # tests/ is DB-gated on DATABASE_URL (see docs/testing.md) — without this
    # service and env var, make test-integration silently self-skips and the
    # whole tests/ suite gets zero execution in CI.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: site_test
          POSTGRES_USER: site_test
          POSTGRES_PASSWORD: site_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://site_test:site_test@localhost:5432/site_test

    steps:
      - uses: actions/checkout@v4

      # Rust edition 2024 → needs a recent stable toolchain (>= 1.85).
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # site_server embeds client/dist via rust-embed, so `clippy --all-targets`
      # and `test --bins` need the folder to exist. A stub is enough — this job
      # doesn't build the real SPA (that's the frontend workflow's job); in debug
      # builds rust-embed reads the folder at runtime, not compile time.
      - name: Stub client/dist for rust-embed
        run: mkdir -p client/dist && printf '<!doctype html><title>stub</title>' > client/dist/index.html

      # make lint = fmt --check + clippy --all-targets -D warnings.
      - name: Lint
        run: make lint

      # Migrations run before *any* test step: DATABASE_URL is set job-wide
      # (above), and some in-module `#[cfg(test)]` unit tests are DB-gated on
      # it too (e.g. ai::engine::tool_registry's tests), not just tests/ — so
      # `make test-unit` needs a migrated DB just as much as
      # `make test-integration` does, or it sees DATABASE_URL pointing at an
      # empty database and fails on a missing table instead of skipping.
      - name: Run migrations
        run: cargo run --bin site_migration

      # make test-unit = cargo test --lib --bins.
      - name: Unit tests
        run: make test-unit

      # make test-integration = cargo test --test '*' — real Postgres above,
      # no local Ollama here so the base assistant-session test skips
      # gracefully (see docs/testing.md); the scripted sub-agent tests do run.
      - name: Integration tests
        run: make test-integration
