name: Verify

# Full gate — lint + all tests (backend + client) — run only when changes land
# on master (i.e. a merged PR). Per-PR feedback is handled by the lighter,
# path-filtered frontend.yml / backend.yml workflows.
on:
  push:
    branches: [master]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + all tests
    runs-on: ubuntu-latest

    # tests/ is DB-gated on DATABASE_URL (see docs/testing.md) — without this
    # service and env var, make test-integration silently self-skips.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: site_test
          POSTGRES_USER: site_test
          POSTGRES_PASSWORD: site_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://site_test:site_test@localhost:5432/site_test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version-file: client/.nvmrc
          cache: npm
          cache-dependency-path: client/package-lock.json

      # Build the real SPA first — rust-embed bakes client/dist into site_server
      # before any cargo build (clippy --all-targets, test --bins).
      - name: Build admin SPA (client/dist)
        run: make client

      - name: Run migrations
        run: cargo run --bin site_migration

      # make verify = lint (fmt --check + clippy -D warnings)
      #             + test (backend unit + integration + client vitest), with
      #             a real Postgres above so integration tests actually run.
      - name: Verify
        run: make verify
